name: Android build (signed AAB / debug APK)
run-name: "Android • ${{ inputs.target }} • ${{ inputs.ref || github.ref_name }}"

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to build"
        type: choice
        required: true
        default: release_aab
        options:
        - release_aab
        - release_apk
        - debug_apk
      ref:
        description: "Git ref (branch/tag/sha), leave empty to use selected branch"
        required: false
        default: ""

jobs:
  build:
    name: "Build (${{ inputs.target }})"
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref || github.ref_name }}
        token: ${{ secrets.CHECKOUT_TOKEN || github.token }}
        submodules: recursive
        fetch-depth: 0

    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: "17"

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Set up Android SDK
      uses: android-actions/setup-android@v4

    - name: Configure build
      id: cfg
      shell: bash
      run: |
        set -euo pipefail
        case "${{ inputs.target }}" in
          release_aab)
            echo "gradle_task=bundleRelease" >> "$GITHUB_OUTPUT"
            echo "kind=aab" >> "$GITHUB_OUTPUT"
            echo "artifact_name=release-aab" >> "$GITHUB_OUTPUT"
            echo "needs_signing=true" >> "$GITHUB_OUTPUT"
            ;;
          release_apk)
            echo "gradle_task=assembleRelease" >> "$GITHUB_OUTPUT"
            echo "kind=apk" >> "$GITHUB_OUTPUT"
            echo "artifact_name=release-apk" >> "$GITHUB_OUTPUT"
            echo "needs_signing=true" >> "$GITHUB_OUTPUT"
            ;;
          debug_apk)
            echo "gradle_task=assembleDebug" >> "$GITHUB_OUTPUT"
            echo "kind=apk" >> "$GITHUB_OUTPUT"
            echo "artifact_name=debug-apk" >> "$GITHUB_OUTPUT"
            echo "needs_signing=false" >> "$GITHUB_OUTPUT"
            ;;
          *)
            echo "Unknown target: ${{ inputs.target }}" >&2
            exit 1
            ;;
        esac

    - name: Decode keystore from secret
      if: ${{ steps.cfg.outputs.needs_signing == 'true' }}
      shell: bash
      env:
        KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        set -euo pipefail
        if [[ -z "${KEYSTORE_B64}" ]]; then
          echo "Missing secret ANDROID_KEYSTORE_BASE64" >&2
          exit 1
        fi
        echo "${KEYSTORE_B64}" | base64 --decode > release.keystore.jks
        echo "KEYSTORE_PATH=${PWD}/release.keystore.jks" >> "$GITHUB_ENV"

    - name: Build
      shell: bash
      run: |
        set -euo pipefail
        chmod +x ./gradlew
        ./gradlew --no-daemon --stacktrace ${{ steps.cfg.outputs.gradle_task }}

    - name: Locate built artifact
      id: locate
      shell: bash
      run: |
        set -euo pipefail

        FILE=""
        case "${{ inputs.target }}" in
          release_aab)
            FILE="./ui/build/outputs/bundle/release/ui-release.aab"
            ;;
          debug_apk)
            FILE="./ui/build/outputs/apk/debug/ui-debug.apk"
            ;;
          release_apk)
            for CANDIDATE in \
              "./ui/build/outputs/apk/release/ui-release-unsigned.apk" \
              "./ui/build/outputs/apk/release/ui-release.apk"; do
              if [[ -f "${CANDIDATE}" ]]; then
                FILE="${CANDIDATE}"
                break
              fi
            done
            ;;
          *)
            echo "Unknown target in locate step: ${{ inputs.target }}" >&2
            exit 1
            ;;
        esac

        if [[ ! -f "${FILE}" ]]; then
          echo "Built file not found: ${FILE}" >&2
          exit 1
        fi

        echo "built_file=${FILE}" >> "$GITHUB_OUTPUT"

    - name: Sign release artifact
      if: ${{ steps.cfg.outputs.needs_signing == 'true' }}
      id: sign
      shell: bash
      env:
        KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: |
        set -euo pipefail

        if [[ -z "${KEYSTORE_PASSWORD}" || -z "${KEY_ALIAS}" ]]; then
          echo "Missing one of secrets: ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS" >&2
          exit 1
        fi

        INPUT_FILE="${{ steps.locate.outputs.built_file }}"
        KEY_PASSWORD_EFFECTIVE="${KEY_PASSWORD:-$KEYSTORE_PASSWORD}"

        if [[ "${{ steps.cfg.outputs.kind }}" == "aab" ]]; then
          SIGNED_AAB="${INPUT_FILE%.aab}-signed.aab"

          KEYPASS_ARGS=()
          if [[ -n "${KEY_PASSWORD}" ]]; then
            KEYPASS_ARGS=(-keypass "${KEY_PASSWORD}")
          fi

          jarsigner \
            -keystore "${KEYSTORE_PATH}" \
            -storepass "${KEYSTORE_PASSWORD}" \
            "${KEYPASS_ARGS[@]}" \
            -signedjar "${SIGNED_AAB}" \
            "${INPUT_FILE}" \
            "${KEY_ALIAS}"

          echo "final_file=${SIGNED_AAB}" >> "$GITHUB_OUTPUT"
        else
          ZIPALIGN="$(find "${ANDROID_HOME}/build-tools" -type f -name zipalign | sort -V | tail -n 1)"
          APKSIGNER="$(find "${ANDROID_HOME}/build-tools" -type f -name apksigner | sort -V | tail -n 1)"

          if [[ -z "${ZIPALIGN}" || -z "${APKSIGNER}" ]]; then
            echo "zipalign/apksigner not found in ANDROID_HOME build-tools" >&2
            exit 1
          fi

          ALIGNED_APK="${INPUT_FILE%.apk}-aligned.apk"
          SIGNED_APK="${INPUT_FILE%-unsigned.apk}-signed.apk"
          if [[ "${SIGNED_APK}" == "${INPUT_FILE}" ]]; then
            SIGNED_APK="${INPUT_FILE%.apk}-signed.apk"
          fi

          "${ZIPALIGN}" -f -p 4 "${INPUT_FILE}" "${ALIGNED_APK}"

          "${APKSIGNER}" sign \
            --ks "${KEYSTORE_PATH}" \
            --ks-key-alias "${KEY_ALIAS}" \
            --ks-pass "pass:${KEYSTORE_PASSWORD}" \
            --key-pass "pass:${KEY_PASSWORD_EFFECTIVE}" \
            --out "${SIGNED_APK}" \
            "${ALIGNED_APK}"

          echo "final_file=${SIGNED_APK}" >> "$GITHUB_OUTPUT"
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.cfg.outputs.artifact_name }}
        path: ${{ steps.sign.outputs.final_file || steps.locate.outputs.built_file }}
        if-no-files-found: error
