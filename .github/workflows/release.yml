name: Release

on:
  push:
    tags:
    - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release"
        required: true
        type: string

jobs:
  validate:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
    - name: Validate tag exists
      env:
        TAG: ${{ inputs.tag }}
      run: |
        git ls-remote --tags "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" "refs/tags/${TAG}" | grep -q . \
          || { echo "::error::Tag '${TAG}' does not exist"; exit 1; }

  build:
    needs: validate
    if: ${{ !cancelled() && (needs.validate.result == 'success' || needs.validate.result == 'skipped') }}
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
    with:
      target: release_apk
      ref: ${{ inputs.tag && format('refs/tags/{0}', inputs.tag) || github.ref }}
    secrets:
      CHECKOUT_TOKEN: ${{ secrets.CHECKOUT_TOKEN }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download build artifact
      uses: actions/download-artifact@v8
      with:
        name: release-apk
        path: artifacts/

    - name: Rename artifacts
      shell: bash
      env:
        TAG_NAME: ${{ inputs.tag || github.ref_name }}
      run: |
        set -euo pipefail
        for APK in artifacts/*.apk; do
          BASENAME="$(basename "${APK}")"
          ABI="$(echo "${BASENAME}" | sed -n 's/^ui-\(.*\)-release.*\.apk$/\1/p')"
          if [[ -n "${ABI}" ]]; then
            mv "${APK}" "artifacts/AmneziaWG-Plus-${TAG_NAME}-${ABI}.apk"
          else
            mv "${APK}" "artifacts/AmneziaWG-Plus-${TAG_NAME}.apk"
          fi
        done

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.tag || github.ref_name }}
        generate_release_notes: true
        prerelease: ${{ contains(inputs.tag || github.ref_name, '-') }}
        make_latest: ${{ !contains(inputs.tag || github.ref_name, '-') }}
        fail_on_unmatched_files: true
        files: artifacts/*.apk
